<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T-TERM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- HUD corners -->
<div class="hud hud-tl"></div>
<div class="hud hud-tr"></div>
<div class="hud hud-bl"></div>
<div class="hud hud-br"></div>

<!-- Clock -->
<div class="clock-wrap" id="clock-wrap">
  <div class="clock-time" id="clockTime">--:--</div>
  <div class="clock-date" id="clockDate">---</div>
</div>

<!-- Project Picker -->
<div id="picker" class="picker-view">

<!-- Pages container -->
<div class="pages" id="pages">

  <!-- PAGE 1: HERO -->
  <div class="page" id="page0">
    <section class="hero" id="hero">
      <div class="hero-title">T-TERM</div>
      <div class="hero-sub">Terminal</div>
      <div class="fav-hero" id="favHero">
        <div class="fav-hero-empty">Right-click any project below to add favorites</div>
      </div>
      <div class="hero-status" id="heroStatus"></div>
      <button class="all-projects-btn" id="allProjectsBtn" onclick="goPage(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        All Projects
      </button>
    </section>
  </div>

  <!-- PAGE 2: DASHBOARD -->
  <div class="page" id="page1">
    <div class="dashboard" id="dashboard">
      <div class="dash-section">
        <div class="dash-label">Search</div>
        <div class="search-bar">
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" id="searchInput" placeholder="Search projects..." spellcheck="false" autocomplete="off">
          </div>
          <div class="filters" id="filters">
            <button class="filter-pill active" data-filter="All" onclick="setFilter('All')">All</button>
            <button class="filter-pill" data-filter="Active" onclick="setFilter('Active')">Active</button>
            <button class="filter-pill" data-filter="Development" onclick="setFilter('Development')">Development</button>
            <button class="filter-pill" data-filter="Other" onclick="setFilter('Other')">Other</button>
          </div>
          <div class="theme-swatches" style="margin-left:auto">
            <div class="theme-dot active" data-theme="" style="background:linear-gradient(135deg,#0a0a0f,#0d1117)" title="Midnight"></div>
            <div class="theme-dot" data-theme="slate" style="background:linear-gradient(135deg,#1e1e2e,#252536)" title="Slate"></div>
            <div class="theme-dot" data-theme="ivory" style="background:linear-gradient(135deg,#d8d5cf,#cec9c2)" title="Ivory"></div>
            <div class="theme-dot" data-theme="warm" style="background:linear-gradient(135deg,#181210,#1f1915)" title="Warm"></div>
            <div class="theme-dot" data-theme="ocean" style="background:linear-gradient(135deg,#0a1628,#0f1d32)" title="Ocean"></div>
          </div>
        </div>
      </div>
      <div class="dash-section">
        <div class="dash-label">Projects</div>
        <div id="project-grid"></div>
      </div>
    </div>
  </div>

</div><!-- end pages -->

<!-- Page Navigation -->
<div class="page-nav" id="pageNav">
  <button class="page-nav-arrow" id="navPrev" onclick="goPage(currentPage-1)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="page-dots">
    <button class="page-dot active" data-page="0" onclick="goPage(0)"></button>
    <div class="page-dot-label" id="pageLabel">Home</div>
    <button class="page-dot" data-page="1" onclick="goPage(1)"></button>
  </div>
  <button class="page-nav-arrow" id="navNext" onclick="goPage(currentPage+1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

</div><!-- end picker -->

<!-- Terminal View -->
<div class="terminal-view" id="terminal-view">
  <div class="top-bar" id="top-bar">
    <button class="btn-back" id="back-btn" onclick="showPicker()" title="Back to projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>

    <div class="tab-strip" id="tab-strip"></div>

    <!-- Right Toolbar -->
    <div class="toolbar-right">
      <div class="view-toggle">
        <button class="view-btn active" data-view="messenger" onclick="setViewMode('messenger')">Messenger</button>
        <button class="view-btn" data-view="terminal" onclick="setViewMode('terminal')">Terminal</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="layout-btns" id="layout-btns">
        <button class="layout-btn active" data-layout="single" onclick="setLayout('single')" title="Single pane">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="1.5"/></svg>
        </button>
        <button class="layout-btn" data-layout="hsplit" onclick="setLayout('hsplit')" title="Horizontal split">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="1.5"/><line x1="7" y1="1" x2="7" y2="13"/></svg>
        </button>
        <button class="layout-btn" data-layout="vsplit" onclick="setLayout('vsplit')" title="Vertical split">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="1.5"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        </button>
        <button class="layout-btn" data-layout="triple" onclick="setLayout('triple')" title="Triple pane">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="1.5"/><line x1="7" y1="1" x2="7" y2="13"/><line x1="7" y1="7" x2="13" y2="7"/></svg>
        </button>
        <button class="layout-btn" data-layout="quad" onclick="setLayout('quad')" title="Quad pane">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="1.5"/><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        </button>
      </div>
      <div class="toolbar-sep"></div>
      <span id="screenshot-wrap">
        <button class="tool-btn" onclick="toggleScreenshotMenu(event)" title="Screenshot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <div id="screenshot-dropdown">
          <button onclick="doScreenshot('snip')">Snip Region</button>
          <button onclick="doScreenshot('window')">Window</button>
          <button onclick="doScreenshot('screen')">Screen</button>
        </div>
      </span>
      <button class="tool-btn" id="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
    </div>
  </div>
  <div class="pane-area layout-single" id="pane-area"></div>
  <div class="messenger-pane" id="messengerPane"></div>
</div>

<!-- Mobile Chat View (iOS/iPad) -->
<div id="mobile-chat" style="display:none">
  <div id="mobile-header">
    <button id="mobile-back" onclick="mobileShowPicker()">&#9664;</button>
    <span id="mobile-project-name"></span>
    <button id="mobile-toggle-view" onclick="mobileToggleView()">TTY</button>
    <button id="mobile-mute" onclick="mobileToggleMute()"></button>
  </div>
  <div id="mobile-messages"></div>
  <div id="mobile-terminal" style="display:none"></div>
  <div id="mobile-input-bar">
    <button id="mobile-mic" onclick="mobileToggleMic()"><svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    <textarea id="mobile-input" placeholder="Message Claude..." rows="1"></textarea>
    <button id="mobile-send" onclick="mobileSend()">&#9654;</button>
  </div>
</div>

<div id="drop-overlay">DROP FILE</div>
<div id="snip-overlay"><canvas id="snip-canvas"></canvas><div id="snip-sel"></div></div>

<!-- Confirm Modal -->
<div id="confirm-modal" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-panel">
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn-no" onclick="closeConfirm()">Cancel</button>
      <button class="btn-yes" id="confirm-yes">Confirm</button>
    </div>
  </div>
</div>

<!-- Resume Modal -->
<div id="resume-modal" onclick="if(event.target===this)closeResumeModal()">
  <div class="resume-panel">
    <div class="resume-header">
      <h2 id="resume-title">Resume Session</h2>
      <button class="resume-close" onclick="closeResumeModal()">&times;</button>
    </div>
    <div class="resume-list" id="resume-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.19.0/lib/addon-webgl.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
